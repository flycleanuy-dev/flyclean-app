name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps (reproducible)
        run: npm ci

      - name: Security audit (high+)
        run: npm audit --audit-level=high

      # F0 de la modularización (15/07). Alcance: el código YA modularizado (api/, scripts/, tests/).
      # index.html queda fuera hasta que la modularización lo parta en /src (ver .prettierignore).
      # Local, antes de pushear: `npm run lint` y `npm run format` (o `npm run lint:fix`).
      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Syntax check api/*.js
        run: |
          for f in $(find api -name '*.js'); do
            echo "· $f"
            node --check "$f"
          done

      - name: Syntax check index.html inline JS
        run: npm run check

      # smoke (app viva) + permisos por rol. Los casos autenticados de permisos.mjs solo corren si
      # CRON_SECRET está cargado como secret del repo (Settings → Secrets → Actions); sin él, se saltean
      # (no rompen el CI). Con él, validan la matriz real (Ventas/Gastos 403, operario solo sus servicios, etc.).
      - name: Tests (smoke + permisos por rol)
        run: npm test
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
